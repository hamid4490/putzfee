name: putzfee
description: "PUTZFEE mobile app — multilingual cleaning & car-wash booking client."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Networking + persistence
  dio: ^5.6.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Date/time + i18n
  intl: ^0.20.2

  # Routing
  go_router: ^14.6.2

  # UI helpers
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Map (uses Mapbox raster tiles via flutter_map — no native SDK needed)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Images
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Deep links / browser open
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
